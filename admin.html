<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaimSolver Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        
        /* Login */
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #1e293b; padding: 2.5rem; border-radius: 1rem; width: 100%; max-width: 400px; border-top: 4px solid #d4af37; }
        .login-logo { text-align: center; margin-bottom: 2rem; }
        .login-logo h1 { font-size: 1.75rem; color: #d4af37; }
        .login-logo p { color: #64748b; font-size: 0.875rem; margin-top: 0.5rem; }
        .login-input { width: 100%; padding: 0.75rem 1rem; background: #0f172a; border: 2px solid #334155; border-radius: 0.5rem; color: white; font-size: 1rem; margin-bottom: 1rem; }
        .login-input:focus { outline: none; border-color: #d4af37; }
        .login-btn { width: 100%; padding: 0.875rem; background: linear-gradient(135deg, #d4af37, #b8962e); color: #0f172a; font-weight: bold; font-size: 1rem; border: none; border-radius: 0.5rem; cursor: pointer; }
        .login-btn:hover { opacity: 0.9; }
        .login-error { color: #ef4444; font-size: 0.875rem; margin-bottom: 1rem; display: none; }

        /* Dashboard */
        .dashboard { display: none; }
        .topbar { background: #1e293b; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 10; }
        .topbar h1 { font-size: 1.25rem; color: #d4af37; }
        .topbar-right { display: flex; align-items: center; gap: 1rem; }
        .logout-btn { padding: 0.5rem 1rem; background: #334155; color: #e2e8f0; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 0.875rem; }
        .logout-btn:hover { background: #475569; }
        .refresh-btn { padding: 0.5rem 1rem; background: #1e3a8a; color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 0.875rem; }

        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1.5rem 2rem; }
        .stat-card { background: #1e293b; padding: 1.25rem; border-radius: 0.75rem; border-left: 4px solid #1e3a8a; }
        .stat-card.gold { border-left-color: #d4af37; }
        .stat-card.green { border-left-color: #16a34a; }
        .stat-card.red { border-left-color: #ef4444; }
        .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: bold; color: white; }

        /* Filters */
        .filters { padding: 0 2rem 1rem; display: flex; gap: 1rem; flex-wrap: wrap; }
        .filter-btn { padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid #334155; background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.875rem; transition: all 0.2s; }
        .filter-btn.active { background: #1e3a8a; border-color: #1e3a8a; color: white; }
        .search-input { padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid #334155; background: #1e293b; color: white; font-size: 0.875rem; width: 250px; }
        .search-input:focus { outline: none; border-color: #1e3a8a; }

        /* Table */
        .table-container { padding: 0 2rem 2rem; }
        .table-wrapper { background: #1e293b; border-radius: 0.75rem; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0f172a; padding: 0.875rem 1rem; text-align: left; font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 1rem; border-bottom: 1px solid #0f172a; font-size: 0.875rem; vertical-align: top; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        /* Status badges */
        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
        .badge-pending { background: #422006; color: #fb923c; }
        .badge-sent { background: #052e16; color: #4ade80; }
        .badge-closed { background: #1e293b; color: #64748b; border: 1px solid #334155; }

        /* Success rate */
        .success-rate { font-size: 1.25rem; font-weight: bold; color: #d4af37; }

        /* Actions */
        .action-btn { padding: 0.375rem 0.75rem; border-radius: 0.375rem; border: none; cursor: pointer; font-size: 0.75rem; font-weight: 600; margin-right: 0.25rem; margin-bottom: 0.25rem; }
        .btn-sent { background: #052e16; color: #4ade80; }
        .btn-closed { background: #1e3b8a22; color: #94a3b8; border: 1px solid #334155; }
        .btn-file { background: #1e3a8a; color: white; }
        .btn-pending { background: #422006; color: #fb923c; }

        /* Detail expand */
        .detail-row { display: none; }
        .detail-row td { background: #0f172a; padding: 1.5rem; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .detail-item label { font-size: 0.75rem; color: #64748b; display: block; margin-bottom: 0.25rem; }
        .detail-item p { color: #e2e8f0; font-size: 0.875rem; line-height: 1.6; }
        .expand-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 0.75rem; padding: 0; }
        .expand-btn:hover { color: white; }

        /* Note */
        .note-input { width: 100%; background: #1e293b; border: 1px solid #334155; color: white; padding: 0.5rem; border-radius: 0.375rem; font-size: 0.875rem; resize: vertical; min-height: 60px; margin-top: 0.5rem; }
        .save-note-btn { margin-top: 0.5rem; padding: 0.375rem 0.75rem; background: #1e3a8a; color: white; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.75rem; }

        /* Empty */
        .empty { text-align: center; padding: 4rem; color: #475569; }

        /* Mobile */
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .table-container { padding: 0 1rem 2rem; }
            .filters { padding: 0 1rem 1rem; }
            th:nth-child(4), td:nth-child(4),
            th:nth-child(5), td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <div class="login-logo">
            <h1>⚖ ClaimSolver</h1>
            <p>Admin Paneli</p>
        </div>
        <p class="login-error" id="loginError">Kullanıcı adı veya şifre hatalı.</p>
        <input type="text" class="login-input" id="loginUser" placeholder="Kullanıcı adı" onkeydown="if(event.key==='Enter')login()">
        <input type="password" class="login-input" id="loginPass" placeholder="Şifre" onkeydown="if(event.key==='Enter')login()">
        <button class="login-btn" onclick="login()">Giriş Yap</button>
    </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
    <div class="topbar">
        <h1>⚖ ClaimSolver Admin</h1>
        <div class="topbar-right">
            <span style="color:#64748b;font-size:0.875rem;" id="lastUpdate"></span>
            <button class="refresh-btn" onclick="loadSubmissions()">🔄 Yenile</button>
            <button class="logout-btn" onclick="logout()">Çıkış</button>
        </div>
    </div>

    <div class="stats" id="statsArea">
        <div class="stat-card"><div class="stat-label">Toplam Başvuru</div><div class="stat-value" id="statTotal">-</div></div>
        <div class="stat-card gold"><div class="stat-label">Bekliyor</div><div class="stat-value" id="statPending">-</div></div>
        <div class="stat-card green"><div class="stat-label">Rapor Gönderildi</div><div class="stat-value" id="statSent">-</div></div>
        <div class="stat-card red"><div class="stat-label">Kapalı</div><div class="stat-value" id="statClosed">-</div></div>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">Tümü</button>
        <button class="filter-btn" onclick="setFilter('pending', this)">Bekliyor</button>
        <button class="filter-btn" onclick="setFilter('sent', this)">Rapor Gönderildi</button>
        <button class="filter-btn" onclick="setFilter('closed', this)">Kapalı</button>
        <input type="text" class="search-input" id="searchInput" placeholder="Ad, email veya hizmet ara..." oninput="renderTable()">
    </div>

    <div class="table-container">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Başvuru</th>
                        <th>Hizmet</th>
                        <th>AI Skoru</th>
                        <th>Tarih</th>
                        <th>Durum</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="empty hidden" id="emptyState">Henüz başvuru yok.</div>
        </div>
    </div>
</div>

<script>
    const ADMIN_USER = 'claimsolver';
    const ADMIN_PASS = 'CS2026admin!';
    const API_URL = 'https://claimsolver-backend-production.up.railway.app';

    let allSubmissions = [];
    let currentFilter = 'all';
    let statusOverrides = {};

    function login() {
        const user = document.getElementById('loginUser').value;
        const pass = document.getElementById('loginPass').value;
        if (user === ADMIN_USER && pass === ADMIN_PASS) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            sessionStorage.setItem('cs_admin', '1');
            loadSubmissions();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function logout() {
        sessionStorage.removeItem('cs_admin');
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
    }

    async function loadSubmissions() {
        try {
            const res = await fetch(`${API_URL}/api/submissions`);
            const data = await res.json();
            allSubmissions = (data.submissions || []).reverse();
            document.getElementById('lastUpdate').textContent = 'Son güncelleme: ' + new Date().toLocaleTimeString('tr-TR');
            updateStats();
            renderTable();
        } catch (e) {
            console.error('Load error:', e);
        }
    }

    function updateStats() {
        const total = allSubmissions.length;
        const pending = allSubmissions.filter(s => getStatus(s) === 'pending').length;
        const sent = allSubmissions.filter(s => getStatus(s) === 'sent').length;
        const closed = allSubmissions.filter(s => getStatus(s) === 'closed').length;
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statPending').textContent = pending;
        document.getElementById('statSent').textContent = sent;
        document.getElementById('statClosed').textContent = closed;
    }

    function getStatus(s) {
        return statusOverrides[s.id] || s.status || 'pending';
    }

    function setStatus(id, status) {
        statusOverrides[id] = status;
        updateStats();
        renderTable();
    }

    function setFilter(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTable();
    }

    function renderTable() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allSubmissions.filter(s => {
            const matchFilter = currentFilter === 'all' || getStatus(s) === currentFilter;
            const matchSearch = !search || 
                s.name?.toLowerCase().includes(search) || 
                s.email?.toLowerCase().includes(search) || 
                s.serviceType?.toLowerCase().includes(search);
            return matchFilter && matchSearch;
        });

        const tbody = document.getElementById('tableBody');
        const empty = document.getElementById('emptyState');

        if (filtered.length === 0) {
            tbody.innerHTML = '';
            empty.classList.remove('hidden');
            return;
        }
        empty.classList.add('hidden');

        tbody.innerHTML = filtered.map(s => {
            const status = getStatus(s);
            const badgeClass = status === 'sent' ? 'badge-sent' : status === 'closed' ? 'badge-closed' : 'badge-pending';
            const badgeText = status === 'sent' ? '✓ Rapor Gönderildi' : status === 'closed' ? '● Kapalı' : '⏳ Bekliyor';
            const date = new Date(s.timestamp).toLocaleDateString('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });

            return `
            <tr>
                <td>
                    <div style="font-weight:600;color:white;">${s.name}</div>
                    <div style="color:#64748b;font-size:0.75rem;">${s.email}</div>
                    ${s.company ? `<div style="color:#475569;font-size:0.75rem;">${s.company}</div>` : ''}
                    <button class="expand-btn" onclick="toggleDetail('${s.id}')">▼ Detay</button>
                </td>
                <td style="color:#94a3b8;">${s.serviceType}</td>
                <td><span class="success-rate">${s.successProbability ? '%' + s.successProbability : '-'}</span></td>
                <td style="color:#64748b;font-size:0.75rem;">${date}</td>
                <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                <td>
                    ${s.fileUrl ? `<button class="action-btn btn-file" onclick="window.open('${s.fileUrl}','_blank')">📎 Dosya</button>` : ''}
                    <button class="action-btn btn-sent" onclick="setStatus('${s.id}','sent')">✓ Gönderildi</button>
                    <button class="action-btn btn-closed" onclick="setStatus('${s.id}','closed')">Kapat</button>
                    ${status !== 'pending' ? `<button class="action-btn btn-pending" onclick="setStatus('${s.id}','pending')">↩ Bekliyor</button>` : ''}
                </td>
            </tr>
            <tr class="detail-row" id="detail-${s.id}">
                <td colspan="6">
                    <div class="detail-grid">
                        <div class="detail-item">
                            <label>📝 Açıklama</label>
                            <p>${s.description || 'Belirtilmedi'}</p>
                        </div>
                        <div class="detail-item">
                            <label>🤖 AI Analizi</label>
                            <p>${s.summary || '-'}</p>
                        </div>
                        <div class="detail-item">
                            <label>📞 Telefon</label>
                            <p>${s.phone || 'Belirtilmedi'}</p>
                        </div>
                        <div class="detail-item">
                            <label>🌐 Dil</label>
                            <p>${s.language === 'en' ? 'İngilizce' : 'Türkçe'}</p>
                        </div>
                        <div class="detail-item">
                            <label>🆔 Dosya ID</label>
                            <p style="font-family:monospace;font-size:0.75rem;">${s.id}</p>
                        </div>
                        <div class="detail-item">
                            <label>📎 Dosya</label>
                            <p>${s.fileUrl ? `<a href="${s.fileUrl}" target="_blank" style="color:#60a5fa;">Dosyayı Görüntüle</a>` : 'Dosya yok'}</p>
                        </div>
                    </div>
                    <div style="margin-top:1rem;">
                        <label style="font-size:0.75rem;color:#64748b;">📋 Not Ekle</label>
                        <textarea class="note-input" id="note-${s.id}" placeholder="Bu başvuru hakkında not...">${s.note || ''}</textarea>
                        <button class="save-note-btn" onclick="saveNote('${s.id}')">💾 Kaydet</button>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    function toggleDetail(id) {
        const row = document.getElementById('detail-' + id);
        row.style.display = row.style.display === 'table-row' ? 'none' : 'table-row';
    }

    function saveNote(id) {
        const note = document.getElementById('note-' + id).value;
        const sub = allSubmissions.find(s => s.id === id);
        if (sub) sub.note = note;
        alert('Not kaydedildi.');
    }

    // Auto-refresh every 2 minutes
    setInterval(loadSubmissions, 120000);

    // Check session
    if (sessionStorage.getItem('cs_admin')) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadSubmissions();
    }
</script>
</body>
</html>
